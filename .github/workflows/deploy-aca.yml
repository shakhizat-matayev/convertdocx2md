name: Build and Deploy to Azure Container Apps

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: graphrag-api
  APP_PORT: "8000"
  PLACEHOLDER_PORT: "80"

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR login server
        id: acr
        run: |
          ACR_LOGIN_SERVER=$(az acr show -n ${{ vars.ACR_NAME }} --query loginServer -o tsv)
          echo "login_server=$ACR_LOGIN_SERVER" >> $GITHUB_OUTPUT

      - name: Login to ACR (push)
        run: |
          az acr login -n ${{ vars.ACR_NAME }}

      - name: Build and Push Image
        run: |
          IMAGE_TAG=${{ github.sha }}
          IMAGE="${{ steps.acr.outputs.login_server }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Ensure Container App exists and is not in Failed state
        run: |
          set +e
          az containerapp show -g ${{ vars.RESOURCE_GROUP }} -n ${{ vars.CONTAINERAPP_NAME }} > /dev/null 2>&1
          EXISTS=$?
          set -e

          if [ $EXISTS -eq 0 ]; then
            STATE=$(az containerapp show -g ${{ vars.RESOURCE_GROUP }} -n ${{ vars.CONTAINERAPP_NAME }} --query properties.provisioningState -o tsv)
            echo "Current provisioningState=$STATE"
            if [ "$STATE" = "Failed" ]; then
              echo "Container App is in Failed state. Deleting to recreate cleanly..."
              az containerapp delete -g ${{ vars.RESOURCE_GROUP }} -n ${{ vars.CONTAINERAPP_NAME }} --yes
            fi
          fi


      - name: Create Container App (if missing) using public placeholder image (NO ingress)
        run: |
          set +e
          az containerapp show -g ${{ vars.RESOURCE_GROUP }} -n ${{ vars.CONTAINERAPP_NAME }} > /dev/null 2>&1
          EXISTS=$?
          set -e

          if [ $EXISTS -ne 0 ]; then
            echo "Creating Container App with placeholder image (public) WITHOUT ingress..."
            az containerapp create \
              -g ${{ vars.RESOURCE_GROUP }} \
              -n ${{ vars.CONTAINERAPP_NAME }} \
              --environment ${{ vars.CONTAINERAPP_ENV }} \
              --image mcr.microsoft.com/azuredocs/containerapps-helloworld:latest \
              --min-replicas 1 --max-replicas 3 \
              --cpu 1.0 --memory 2.0Gi
          else
            echo "Container App exists."
          fi


      - name: Configure ACR registry credentials for Container App (image pull)
        run: |
          az containerapp registry set \
            -g ${{ vars.RESOURCE_GROUP }} \
            -n ${{ vars.CONTAINERAPP_NAME }} \
            --server ${{ steps.acr.outputs.login_server }} \
            --username ${{ secrets.ACR_USERNAME }} \
            --password ${{ secrets.ACR_PASSWORD }}
        # registry commands are supported for configuring container registry access
        # [2](https://github.com/microsoft/graphrag/discussions/2041)

      - name: Set/Update ACA secrets (app-level)
        run: |
          az containerapp secret set \
            -g ${{ vars.RESOURCE_GROUP }} \
            -n ${{ vars.CONTAINERAPP_NAME }} \
            --secrets \
              graphrag-api-key='${{ secrets.GRAPHRAG_API_KEY }}' \
              storage-conn='${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}' \
              search-admin-key='${{ secrets.AZURE_SEARCH_ADMIN_KEY }}'
        # secrets are app-scoped and referenced later as secretref
        # [4](https://gist.github.com/vprasadreddy/c0376f70e23ac151c537188fd8402541)[6](https://learn.microsoft.com/en-us/cli/azure/search?view=azure-cli-latest)

      - name: Deploy new revision (real image + env vars)
        run: |
          az containerapp update \
            -g ${{ vars.RESOURCE_GROUP }} \
            -n ${{ vars.CONTAINERAPP_NAME }} \
            --image $IMAGE \
            --set-env-vars \
              PORT=8000 \
              GRAPHRAG_ROOT='${{ vars.GRAPHRAG_ROOT }}' \
              GRAPHRAG_ARTIFACTS_CONTAINER='${{ vars.GRAPHRAG_ARTIFACTS_CONTAINER }}' \
              GRAPHRAG_ARTIFACTS_PREFIX='${{ vars.GRAPHRAG_ARTIFACTS_PREFIX }}' \
              AZURE_OPENAI_ENDPOINT='${{ vars.AZURE_OPENAI_ENDPOINT }}' \
              AZURE_OPENAI_API_VERSION='${{ vars.AZURE_OPENAI_API_VERSION }}' \
              AZURE_OPENAI_CHAT_DEPLOYMENT='${{ vars.AZURE_OPENAI_CHAT_DEPLOYMENT }}' \
              AZURE_OPENAI_EMBED_DEPLOYMENT='${{ vars.AZURE_OPENAI_EMBED_DEPLOYMENT }}' \
              AZURE_SEARCH_ENDPOINT='${{ vars.AZURE_SEARCH_ENDPOINT }}' \
              GRAPHRAG_API_KEY=secretref:graphrag-api-key \
              AZURE_STORAGE_CONNECTION_STRING=secretref:storage-conn \
              AZURE_SEARCH_ADMIN_KEY=secretref:search-admin-key

      
      - name: Enable/Update ingress (external) to target port 8000
        run: |
          az containerapp ingress enable \
            -g ${{ vars.RESOURCE_GROUP }} \
            -n ${{ vars.CONTAINERAPP_NAME }} \
            --type external \
            --target-port 8000 \
            --transport auto


      - name: Show FQDN
        run: |
          az containerapp show \
            -g ${{ vars.RESOURCE_GROUP }} \
            -n ${{ vars.CONTAINERAPP_NAME }} \
            --query properties.configuration.ingress.fqdn -o tsv
        # GH Actions deploying revisions is a supported ACA pattern
        # [3](https://deepwiki.com/microsoft/graphrag/7-storage-system)