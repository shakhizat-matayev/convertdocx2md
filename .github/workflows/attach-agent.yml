name: Update Foundry Agent (Attach OpenAPI)

on:
  workflow_run:
    workflows: ["Build and Deploy to Azure Container Apps"]
    types: [completed]

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  attach:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the deployed commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Wait for OpenAPI SDK Validation success on deployed commit
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
          TARGET_WORKFLOW_NAME: OpenAPI SDK Validation
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.request

          token = os.environ["GH_TOKEN"]
          repo = os.environ["REPO"]
          sha = os.environ["TARGET_SHA"]
          target_name = os.environ["TARGET_WORKFLOW_NAME"]

          timeout_seconds = 30 * 60
          poll_interval_seconds = 20
          deadline = time.time() + timeout_seconds

          def fetch_runs() -> list[dict]:
            url = f"https://api.github.com/repos/{repo}/actions/runs?head_sha={sha}&per_page=100"
            req = urllib.request.Request(
              url,
              headers={
                "Authorization": f"Bearer {token}",
                "Accept": "application/vnd.github+json",
                "X-GitHub-Api-Version": "2022-11-28",
              },
            )
            with urllib.request.urlopen(req, timeout=30) as response:
              payload = json.loads(response.read().decode("utf-8"))
            return payload.get("workflow_runs", [])

          def latest_target_run(runs: list[dict]) -> dict | None:
            candidates = [run for run in runs if run.get("name") == target_name]
            if not candidates:
              return None
            candidates.sort(key=lambda run: run.get("created_at", ""), reverse=True)
            return candidates[0]

          while True:
            runs = fetch_runs()
            run = latest_target_run(runs)

            if run is None:
              if time.time() >= deadline:
                print(
                  f"Timed out waiting for workflow '{target_name}' to appear for commit {sha}.",
                  file=sys.stderr,
                )
                sys.exit(1)
              print(f"Waiting for workflow '{target_name}' run to appear for {sha}...")
              time.sleep(poll_interval_seconds)
              continue

            run_id = run.get("id")
            run_status = run.get("status")
            run_conclusion = run.get("conclusion")
            html_url = run.get("html_url")

            print(
              f"Found '{target_name}' run id={run_id} status={run_status} conclusion={run_conclusion}"
            )

            if run_status != "completed":
              if time.time() >= deadline:
                print(
                  f"Timed out waiting for workflow '{target_name}' to complete for commit {sha}.",
                  file=sys.stderr,
                )
                sys.exit(1)
              time.sleep(poll_interval_seconds)
              continue

            if run_conclusion != "success":
              print(
                f"Workflow '{target_name}' did not succeed for commit {sha}. "
                f"Conclusion={run_conclusion}. Run: {html_url}",
                file=sys.stderr,
              )
              sys.exit(1)

            print(f"Workflow '{target_name}' succeeded for commit {sha}.")
            break
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --pre azure-ai-projects azure-identity azure-core jsonref requests

      - name: Validate required workflow secrets
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail

          required=(
            AZURE_CLIENT_ID
            AZURE_TENANT_ID
            AZURE_SUBSCRIPTION_ID
          )

          missing=()
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub repository secrets for attach workflow:\n'
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi

          echo "All required attach workflow secrets are present."

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate required workflow vars
        env:
          AZURE_AI_PROJECT_ENDPOINT: ${{ vars.AZURE_AI_PROJECT_ENDPOINT }}
          AZURE_AI_MODEL_DEPLOYMENT_NAME: ${{ vars.AZURE_AI_MODEL_DEPLOYMENT_NAME }}
          OPENAPI_PROJECT_CONNECTION_NAME: ${{ vars.OPENAPI_PROJECT_CONNECTION_NAME }}
          OPENAPI_SPEC_URL: ${{ vars.OPENAPI_SPEC_URL }}
          AGENT_NAME: ${{ vars.AGENT_NAME }}
        run: |
          set -euo pipefail

          required=(
            AZURE_AI_PROJECT_ENDPOINT
            AZURE_AI_MODEL_DEPLOYMENT_NAME
            OPENAPI_PROJECT_CONNECTION_NAME
            OPENAPI_SPEC_URL
            AGENT_NAME
          )

          missing=()
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub repository variables for attach workflow:\n'
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi

          echo "All required attach workflow vars are present."

      - name: Recreate agent version with updated OpenAPI tool
        env:
          AZURE_AI_PROJECT_ENDPOINT: ${{ vars.AZURE_AI_PROJECT_ENDPOINT }}
          AZURE_AI_MODEL_DEPLOYMENT_NAME: ${{ vars.AZURE_AI_MODEL_DEPLOYMENT_NAME }}
          OPENAPI_PROJECT_CONNECTION_NAME: ${{ vars.OPENAPI_PROJECT_CONNECTION_NAME }}
          OPENAPI_SPEC_URL: ${{ vars.OPENAPI_SPEC_URL }}
          AGENT_NAME: ${{ vars.AGENT_NAME }}
        run: |
          python attach_openapi_tool.py